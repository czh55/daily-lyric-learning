<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Lyric Learning · 每日英文歌词学习</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <h1>Daily Lyric Learning</h1>
      <p class="tagline">从 Alternative R&B 歌词学英文</p>
      <nav class="header-stats" id="stats"></nav>
    </div>
  </header>

  <main class="container">
    <section id="home-view">
      <section class="hero" id="hero">
        <h2 class="section-label">今日推荐</h2>
        <div id="today-card">
          <div class="loading">加载中…</div>
        </div>
      </section>

      <section class="filters">
        <div class="filter-group">
          <label for="artist-filter">艺人</label>
          <select id="artist-filter">
            <option value="">全部</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="search-input">搜索</label>
          <input type="search" id="search-input" placeholder="歌曲或艺人">
        </div>
      </section>

      <section class="history-section">
        <h2 class="section-label">学习历史</h2>
        <div class="history-list" id="history-grid">
          <div class="loading">加载历史记录…</div>
        </div>
      </section>
    </section>

    <section id="lesson-view" class="lesson-view hidden" aria-hidden="true">
      <button class="btn-back" id="back-btn" type="button">← 返回列表</button>
      <header class="lesson-header" id="lesson-meta"></header>
      <article class="lesson-body markdown-body" id="lesson-body"></article>
    </section>
  </main>

  <footer class="site-footer">
    <p>10 位 Alternative R&B 艺人 · 每日一首 · 逐句精讲</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
